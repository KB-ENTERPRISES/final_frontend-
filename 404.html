<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>KB Enterprises</title>
  <script>
    // GitHub Pages SPA redirect — preserves the clean URL path
    // When a user directly visits /frontend-/place-order, GitHub serves this 404.html
    // This script redirects to index.html while preserving the original path
    var pathSegmentsToKeep = 1; // Keep /frontend-/ as the base
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/' +
      '?p=/' + l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '')
    );
  </script>
</head>
<body></body>
</html>
